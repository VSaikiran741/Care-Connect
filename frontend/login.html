<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <img src="assets/download.jpg" alt="CareConnect Logo" class="logo-image" />
                <h1>CareConnect</h1>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="signup.html" class="nav-link">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <!-- UI Message Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <main class="container">
        <section id="login" class="section active auth-section">
            <h2 class="section-title">Login</h2>
            <form id="loginForm" class="form-group">
                <div class="form-group">
                    <label for="user-type">I am a:</label>
                    <select id="user-type" name="userType" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="volunteer">Volunteer</option>
                        <option value="user">User</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="button button-primary" id="loginBtn">Login</button>
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>Copyright © 2025 CareConnect. All rights reserved.</p>
    </footer>

    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
