<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Help - CareConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #map {
            height: 400px;
            width: 100%;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <img src="download.jpg" alt="CareConnect Logo" class="logo-image" />
                <h1>CareConnect</h1>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><button id="logoutButton" class="button button-primary">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="padding-top: 6rem;">
        <section class="section active">
            <h2 class="section-title">Request Emergency Help</h2>
            <form id="requestForm" class="form-group">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="emergencyType">Emergency Type</label>
                    <select id="emergencyType" required>
                        <option value="" disabled selected>Select emergency type</option>
                        <option value="Medical">Medical</option>
                        <option value="Fire">Fire</option>
                        <option value="Accident">Accident</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">Location (Latitude, Longitude)</label>
                    <input type="text" id="location" readonly>
                    <button type="button" id="gpsButton" class="button button-primary">Use My Location</button>
                    <div id="map"></div>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4" cols="20" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="shareLocation">
                        Share live location with responders
                    </label>
                </div>
                <button type="submit" class="button button-primary">Submit Request</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>Copyright © 2025 CareConnect. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDTWs0CaOew0OJeWO-xKIHDE8W0evl8DAs&callback=initMap" async defer></script>
</body>
</html>
