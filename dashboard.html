<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard - CareConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            display: flex;
            gap: 2rem;
            padding-top: 6rem;
        }
        .sidebar {
            width: 250px;
            background-color: var(--gray-light);
            padding: 1rem;
            border-radius: 8px;
        }
        .nav-item {
            display: block;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background-color: var(--primary-teal);
            color: var(--white);
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .nav-item:hover, .nav-item.active {
            background-color: var(--primary-blue);
        }
        .content-grid {
            flex: 1;
        }
        .requests-list div {
            background-color: var(--white);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .requests-list div:hover {
            background-color: #e0e0e0;
        }
        #map {
            height: 400px;
            width: 100%;
            margin-bottom: 1rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }
        .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .profile-image img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <img src="download.jpg" alt="CareConnect Logo" class="logo-image" />
                <h1>CareConnect</h1>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><button id="logoutButton" class="button button-primary">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="container dashboard-container">
        <aside class="sidebar">
            <div class="profile-image">
                <img src="" alt="Profile">
            </div>
            <h3 id="volunteerName"></h3>
            <div class="nav-item active" data-panel="dashboard">Dashboard</div>
            <div class="nav-item" data-panel="requests">Requests</div>
            <div class="nav-item" data-panel="settings">Logout</div>
        </aside>

        <div class="content-grid">
            <section class="requests-list" style="display: block;">
                <h2 class="section-title">Active Requests</h2>
                <div id="requestList"></div>
            </section>
            <section class="map-container" style="display: block;">
                <h2 class="section-title">Request Locations</h2>
                <div id="map"></div>
            </section>
        </div>
    </main>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Request Details</h2>
            <div id="requestDetails"></div>
            <div class="modal-actions">
                <button id="acceptRequest" class="button button-primary">Accept</button>
                <button id="declineRequest" class="button button-primary">Decline</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Copyright © 2025 CareConnect. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <!-- IMPORTANT: Replace YOUR_API_KEY with your actual Google Maps Key when running locally, but DO NOT upload the real key to GitHub public repo -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initDashboardMaps" ></script>
</body>
</html>
